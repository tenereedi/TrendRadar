version: '3.8'

services:
  trendradar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendradar
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    ports:
      - "${PORT:-9090}:8080"
    networks:
      - trendradar-net

  # Optional: Redis for caching trend data
  redis:
    image: redis:7-alpine
    container_name: trendradar-redis
    restart: unless-stopped
    # Exposing Redis port for local dev inspection (e.g. with redis-cli or TablePlus)
    # Note: remove this port binding before deploying to any shared/prod environment
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - trendradar-net
    profiles:
      - with-cache
    # Bumped memory limit slightly — 128m was causing occasional OOM evictions during
    # longer scraping runs on my machine
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  redis-data:
    driver: local

networks:
  trendradar-net:
    driver: bridge
